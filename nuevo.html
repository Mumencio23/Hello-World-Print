<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="tel"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            font-weight: 400;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Formulario de Registro</h1>
        
        <div class="success-message" id="successMessage">
            ¡Formulario enviado correctamente!
        </div>

        <form id="registroForm" onsubmit="handleSubmit(event)">
            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required>
                    <span class="error" id="errorNombre">El nombre es requerido</span>
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido *</label>
                    <input type="text" id="apellido" name="apellido" required>
                    <span class="error" id="errorApellido">El apellido es requerido</span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
                <span class="error" id="errorEmail">Email inválido</span>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="+34 600 000 000">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="pais">País *</label>
                    <select id="pais" name="pais" required>
                        <option value="">Seleccionar país</option>
                        <option value="es">España</option>
                        <option value="mx">México</option>
                        <option value="ar">Argentina</option>
                        <option value="co">Colombia</option>
                        <option value="pe">Perú</option>
                        <option value="cl">Chile</option>
                        <option value="ve">Venezuela</option>
                        <option value="otros">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="text" id="edad" name="edad" placeholder="Ej: 25">
                </div>
            </div>

            <div class="form-group">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" placeholder="Cuéntanos más sobre ti..."></textarea>
            </div>

            <div class="form-group">
                <label>Intereses</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="interes1" name="intereses" value="tecnologia">
                        <label for="interes1">Tecnología</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="interes2" name="intereses" value="deportes">
                        <label for="interes2">Deportes</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="interes3" name="intereses" value="musica">
                        <label for="interes3">Música</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="interes4" name="intereses" value="viajes">
                        <label for="interes4">Viajes</label>
                    </div>
                </div>
            </div>

            <div class="checkbox-item" style="margin-bottom: 20px;">
                <input type="checkbox" id="terminos" name="terminos" required>
                <label for="terminos">Acepto los términos y condiciones *</label>
            </div>

            <button type="submit">Enviar Formulario</button>
            <button type="reset">Limpiar</button>
        </form>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const email = document.getElementById('email').value.trim();
            
            // Validación básica
            if (!nombre || !apellido || !email) {
                alert('Por favor rellena todos los campos requeridos');
                return;
            }
            
            // Aquí irían datos del formulario
            const formData = {
                nombre: nombre,
                apellido: apellido,
                email: email,
                telefono: document.getElementById('telefono').value,
                pais: document.getElementById('pais').value,
                edad: document.getElementById('edad').value,
                mensaje: document.getElementById('mensaje').value,
                intereses: Array.from(document.querySelectorAll('input[name="intereses"]:checked')).map(el => el.value)
            };
            
            console.log('Datos del formulario:', formData);
            
            // Mostrar mensaje de éxito
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('registroForm').reset();
            
            // Ocultar el mensaje después de 5 segundos
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
